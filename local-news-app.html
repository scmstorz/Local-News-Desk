<!-- VERSION local-v1 - Local desktop UI for SQLite + Ollama backend -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local News Desk</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'><rect width='128' height='128' rx='28' fill='%23f6f1e8'/><circle cx='64' cy='64' r='36' fill='url(%23g)'/><circle cx='64' cy='64' r='14' fill='%23f6f1e8' fill-opacity='0.24'/><defs><linearGradient id='g' x1='24' y1='24' x2='104' y2='104' gradientUnits='userSpaceOnUse'><stop stop-color='%230f766e'/><stop offset='1' stop-color='%23f97316'/></linearGradient></defs></svg>">
    <style>
        :root {
            --bg: #27241f;
            --bg-strong: #191713;
            --panel: rgba(251, 249, 244, 0.92);
            --panel-strong: #fffdf8;
            --line: rgba(43, 37, 33, 0.1);
            --ink: #181512;
            --ink-soft: #5d544c;
            --ink-muted: #877e77;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --accent-cool: #2563eb;
            --accent-cool-strong: #1d4ed8;
            --accent-warm: #f97316;
            --danger: #a53030;
            --danger-soft: #fbe7e3;
            --success-soft: #def7ec;
            --shadow: 0 28px 70px rgba(6, 5, 4, 0.28);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --ui-font: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
            --serif-font: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: var(--ui-font);
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(249, 115, 22, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(37, 99, 235, 0.14), transparent 22%),
                radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.15), transparent 26%),
                linear-gradient(180deg, #2a2621 0%, #1b1814 100%);
            padding: 28px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(24, 21, 18, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(24, 21, 18, 0.025) 1px, transparent 1px);
            background-size: 24px 24px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.55), transparent 95%);
        }

        .app-shell {
            position: relative;
            max-width: 1320px;
            margin: 0 auto;
            background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(250,247,241,0.92));
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow);
            border-radius: 34px;
            overflow: hidden;
            backdrop-filter: blur(18px);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            padding: 18px 22px 14px;
            border-bottom: 1px solid var(--line);
            background:
                linear-gradient(120deg, rgba(255,255,255,0.75), rgba(255,255,255,0.45)),
                linear-gradient(120deg, rgba(15,118,110,0.06), rgba(249,115,22,0.08));
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        .brand-dot {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-warm));
            box-shadow: 0 0 0 8px rgba(15, 118, 110, 0.08);
        }

        .brand h1 {
            font-family: var(--serif-font);
            font-size: clamp(12px, 1.15vw, 17px);
            font-weight: 600;
            line-height: 1.08;
        }

        .brand p {
            color: var(--ink-soft);
            font-size: 12px;
        }

        .topbar-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            min-width: 420px;
        }

        .nav-row,
        .status-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-button,
        .pill,
        .inline-button,
        .action-button {
            border: 0;
            border-radius: 999px;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
        }

        .nav-button {
            padding: 9px 14px;
            background: rgba(255,255,255,0.75);
            color: var(--ink-soft);
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(24, 21, 18, 0.08);
        }

        .nav-button.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #f8fafc;
            box-shadow: 0 12px 30px rgba(15, 118, 110, 0.22);
        }

        .nav-button:hover,
        .inline-button:hover,
        .action-button:hover {
            transform: translateY(-1px);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 11px;
            border-radius: 999px;
            background: rgba(255,255,255,0.72);
            color: var(--ink-soft);
            border: 1px solid rgba(24,21,18,0.08);
            font-size: 11px;
            font-weight: 600;
        }

        .status-pill.compare-on {
            background: rgba(15, 118, 110, 0.14);
            color: var(--accent-strong);
            border-color: rgba(15, 118, 110, 0.16);
        }

        .status-pill.compare-off {
            background: rgba(249, 115, 22, 0.14);
            color: #a04a12;
            border-color: rgba(249, 115, 22, 0.16);
        }

        .status-pill strong {
            color: var(--ink);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--accent);
        }

        .status-dot.off {
            background: var(--danger);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            padding: 28px 30px 34px;
        }

        .screen {
            display: none;
            animation: fadeIn 220ms ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.65);
            border-radius: var(--radius-xl);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            border-bottom: 1px solid var(--line);
        }

        .panel-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .panel-title h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .panel-title p {
            color: var(--ink-soft);
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .segmented {
            display: inline-flex;
            padding: 4px;
            background: rgba(24,21,18,0.06);
            border-radius: 999px;
        }

        .segment-button {
            padding: 10px 14px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--ink-soft);
            font-weight: 600;
            cursor: pointer;
        }

        .segment-button.active {
            background: var(--panel-strong);
            color: var(--ink);
            box-shadow: 0 6px 16px rgba(24, 21, 18, 0.08);
        }

        .inline-button {
            background: rgba(24,21,18,0.06);
            color: var(--ink);
            border: 1px solid rgba(24,21,18,0.08);
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 700;
        }

        .feed-card,
        .summary-card {
            padding: 30px;
        }

        .feed-meta,
        .summary-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 26px;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(24,21,18,0.055);
            color: var(--ink-soft);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
        }

        .feed-card h3,
        .summary-card h3 {
            font-family: var(--serif-font);
            line-height: 1.04;
            font-weight: 600;
            margin-bottom: 22px;
            max-width: 980px;
            text-wrap: balance;
        }

        .feed-card h3 {
            font-size: clamp(28px, 3.2vw, 40px);
            line-height: 1.08;
            max-width: 920px;
        }

        .summary-card h3 {
            font-size: clamp(28px, 3.6vw, 40px);
        }

        .prediction-strip {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding: 18px 20px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(15,118,110,0.09), rgba(255,255,255,0.8));
            border: 1px solid rgba(15,118,110,0.12);
        }

        .prediction-main {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .prediction-label {
            font-size: 12px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        .prediction-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--ink);
        }

        .prediction-value.prediction-high {
            color: var(--accent-strong);
        }

        .prediction-value.prediction-maybe {
            color: #a16207;
        }

        .prediction-value.prediction-low {
            color: var(--ink-soft);
        }

        .prediction-subtle {
            font-size: 14px;
            color: var(--ink-soft);
        }

        .prediction-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            background: rgba(255,255,255,0.72);
        }

        .prediction-badge.good {
            color: var(--accent-strong);
            background: rgba(15,118,110,0.12);
        }

        .prediction-badge.bad {
            color: var(--danger);
            background: rgba(165,48,48,0.11);
        }

        .summary-text {
            max-width: 860px;
            color: #2e2822;
            font-size: 20px;
            line-height: 1.72;
            white-space: pre-wrap;
            margin-bottom: 30px;
        }

        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .action-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-button {
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.01em;
        }

        .action-button.neutral {
            background: rgba(24,21,18,0.06);
            color: var(--ink);
            border: 1px solid rgba(24,21,18,0.08);
        }

        .action-button.primary {
            color: #f8fafc;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 12px 28px rgba(15,118,110,0.18);
        }

        .action-button.cool {
            color: #f8fbff;
            background: linear-gradient(135deg, var(--accent-cool), var(--accent-cool-strong));
            box-shadow: 0 12px 28px rgba(37,99,235,0.2);
        }

        .action-button.warm {
            color: #fff9f5;
            background: linear-gradient(135deg, #f97316, #ea580c);
            box-shadow: 0 12px 28px rgba(249,115,22,0.2);
        }

        .action-button.danger {
            color: #fff8f7;
            background: linear-gradient(135deg, #c2410c, #9a3412);
            box-shadow: 0 12px 28px rgba(154,52,18,0.18);
        }

        .action-note {
            color: var(--ink-soft);
            font-size: 14px;
        }

        .empty-state {
            padding: 44px 30px;
            text-align: center;
        }

        .empty-state h3 {
            font-family: var(--serif-font);
            font-size: 32px;
            margin-bottom: 12px;
        }

        .empty-state p {
            max-width: 620px;
            margin: 0 auto;
            color: var(--ink-soft);
            line-height: 1.6;
        }

        .queue-banner {
            margin: 0 30px 22px;
            padding: 16px 18px;
            border-radius: var(--radius-lg);
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            background: linear-gradient(135deg, rgba(249,115,22,0.12), rgba(255,255,255,0.75));
            border: 1px solid rgba(249,115,22,0.14);
        }

        .queue-banner strong {
            font-size: 16px;
        }

        .ops-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .ops-card {
            padding: 22px;
            border-radius: var(--radius-lg);
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(24,21,18,0.08);
        }

        .ops-card h3 {
            font-size: 18px;
            margin-bottom: 14px;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin: 16px 0 20px;
        }

        .metric {
            padding: 14px;
            border-radius: 16px;
            background: rgba(24,21,18,0.045);
        }

        .metric-label {
            font-size: 12px;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 7px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--ink);
        }

        .data-points {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 8px 0 18px;
        }

        .data-pill {
            padding: 9px 12px;
            border-radius: 999px;
            background: rgba(24,21,18,0.05);
            color: var(--ink-soft);
            font-size: 13px;
            font-weight: 600;
        }

        .data-pill.compare-on {
            background: rgba(15, 118, 110, 0.14);
            color: var(--accent-strong);
            box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.16);
        }

        .data-pill.compare-off {
            background: rgba(249, 115, 22, 0.14);
            color: #a04a12;
            box-shadow: inset 0 0 0 1px rgba(249, 115, 22, 0.16);
        }

        .matrix {
            width: 100%;
            border-collapse: collapse;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .matrix th,
        .matrix td {
            padding: 12px 14px;
            text-align: center;
            border: 1px solid rgba(24,21,18,0.08);
        }

        .matrix th {
            background: rgba(24,21,18,0.06);
            font-size: 12px;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .ops-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .ops-assessment {
            margin: 14px 0 18px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(24,21,18,0.05);
            border: 1px solid rgba(24,21,18,0.08);
        }

        .ops-assessment strong {
            display: block;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .ops-assessment p {
            color: var(--ink-soft);
            font-size: 14px;
            line-height: 1.55;
        }

        .toast-stack {
            position: fixed;
            top: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }

        .toast {
            min-width: 280px;
            max-width: 360px;
            padding: 14px 16px;
            border-radius: 18px;
            color: #fffdf8;
            box-shadow: 0 18px 44px rgba(24,21,18,0.18);
            animation: toastIn 180ms ease;
        }

        .toast.info {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        }

        .toast.warn {
            background: linear-gradient(135deg, #ea580c, #c2410c);
        }

        .toast.error {
            background: linear-gradient(135deg, #b91c1c, #991b1b);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-4px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 980px) {
            body {
                padding: 12px;
            }

            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .topbar-right {
                min-width: 0;
                align-items: flex-start;
            }

            .nav-row,
            .status-row {
                justify-content: flex-start;
            }

            .ops-grid,
            .metric-grid {
                grid-template-columns: 1fr;
            }

            .feed-card h3,
            .summary-card h3 {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">
                    <span class="brand-dot"></span>
                    <span>Local News Desk</span>
                </div>
                <h1>Feeds lesen. Lokal zusammenfassen. Prädiktor trainieren.</h1>
                <p>Desktop-Workflow für Feed-Entscheidungen, lokale Summaries und nüchterne Model-Ops.</p>
            </div>
            <div class="topbar-right">
                <div class="nav-row">
                    <button class="nav-button active" data-screen="feed">Feed</button>
                    <button class="nav-button" data-screen="summaries">Summaries <span id="navSummaryCount"></span></button>
                    <button class="nav-button" data-screen="ops">Model Ops</button>
                    <button class="nav-button" id="pageReloadButton" title="Seite neu laden">Reload</button>
                </div>
                <div class="status-row">
                    <div class="status-pill">Feed <strong id="feedPendingCount">0</strong></div>
                    <div class="status-pill">Empfohlen <strong id="feedRecommendedCount">0</strong></div>
                    <div class="status-pill">Vielleicht <strong id="feedMaybeCount">0</strong></div>
                    <div class="status-pill" id="feedSimilarPill" style="display:none;">Ähnliche <strong id="feedSimilarCount">0 in 0 Gruppen</strong></div>
                    <div class="status-pill">Primär-Queue <strong id="summaryQueueCount">0</strong></div>
                    <div class="status-pill">Primär bereit <strong id="summaryReadyCount">0</strong></div>
                    <div class="status-pill compare-off" id="compareStatusPill">Compare <strong id="compareStatusValue">aus</strong></div>
                </div>
            </div>
        </header>

        <main class="main-layout">
            <section class="screen active" id="screen-feed"></section>
            <section class="screen" id="screen-summaries"></section>
            <section class="screen" id="screen-ops"></section>
        </main>
    </div>

    <div class="toast-stack" id="toastStack"></div>

    <script>
        function resolveApiBase() {
            if (window.LOCAL_NEWS_API_BASE) {
                return String(window.LOCAL_NEWS_API_BASE).replace(/\/$/, '');
            }
            if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                return `${window.location.origin}/api`;
            }
            return 'http://127.0.0.1:8765/api';
        }

        const API_BASE = resolveApiBase();
        const state = {
            screen: 'feed',
            feedMode: 'all',
            allFeedItems: [],
            feedItems: [],
            feedCounts: null,
            feedIndex: 0,
            feedHistory: [],
            feedHistoryIndex: -1,
            feedLoading: false,
            feedError: '',
            feedDeduplicating: false,
            lastFeedDeduplicateResult: null,
            lastFeedActionStatus: '',
            summaries: [],
            summaryIndex: 0,
            status: null,
            modelOps: null,
            lastReadyCount: 0,
            trainingBusy: false,
            trainingState: null,
            trainingLastResult: null,
            trainingTickHandle: null,
            feedMutationChain: Promise.resolve(),
        };

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function showToast(message, level = 'info') {
            const stack = document.getElementById('toastStack');
            const toast = document.createElement('div');
            toast.className = `toast ${level}`;
            toast.textContent = message;
            stack.appendChild(toast);
            window.setTimeout(() => {
                toast.remove();
            }, 8000);
        }

        function nextFrame() {
            return new Promise(resolve => window.requestAnimationFrame(() => resolve()));
        }

        function startTrainingTicker() {
            stopTrainingTicker();
            state.trainingTickHandle = window.setInterval(() => {
                if (state.trainingBusy && state.screen === 'ops') {
                    renderOpsScreen();
                }
            }, 1000);
        }

        function stopTrainingTicker() {
            if (state.trainingTickHandle) {
                window.clearInterval(state.trainingTickHandle);
                state.trainingTickHandle = null;
            }
        }

        async function api(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: {
                    'Content-Type': 'application/json',
                },
                ...options,
            });
            const body = await response.json().catch(() => ({}));
            if (!response.ok) {
                const message = body.message || `HTTP ${response.status}`;
                throw new Error(message);
            }
            return body;
        }

        function formatRelativeTime(isoString) {
            if (!isoString) return 'ohne Zeit';
            const date = new Date(isoString);
            const diffMs = Date.now() - date.getTime();
            const diffMin = Math.round(diffMs / 60000);
            if (diffMin < 1) return 'gerade eben';
            if (diffMin < 60) return `vor ${diffMin} min`;
            const diffHours = Math.round(diffMin / 60);
            if (diffHours < 24) return `vor ${diffHours} h`;
            const diffDays = Math.round(diffHours / 24);
            return `vor ${diffDays} d`;
        }

        function formatProbability(probability) {
            if (probability === null || probability === undefined) return '—';
            return `${Math.round(probability * 100)}%`;
        }

        function formatDuration(durationMs) {
            if (durationMs === null || durationMs === undefined) return '—';
            const seconds = durationMs / 1000;
            if (seconds < 1) return `${Math.round(durationMs)} ms`;
            if (seconds < 60) return `${seconds.toFixed(1)} s`;
            return `${(seconds / 60).toFixed(1)} min`;
        }

        function formatRefreshInterval(seconds) {
            if (seconds === null || seconds === undefined) return '—';
            const numeric = Number(seconds);
            if (!Number.isFinite(numeric) || numeric <= 0) return '—';
            if (numeric % 60 === 0) {
                const minutes = numeric / 60;
                return `${minutes} min`;
            }
            return `${numeric} s`;
        }

        function formatPrimaryFailureBreakdown(sessionStats) {
            if (!sessionStats?.primary_failed) {
                return `${sessionStats?.primary_failed ?? 0} fehlgeschlagen`;
            }
            const parts = [];
            if (sessionStats.primary_failed_source) {
                parts.push(`${sessionStats.primary_failed_source} Quelle/Text`);
            }
            if (sessionStats.primary_failed_ollama) {
                parts.push(`${sessionStats.primary_failed_ollama} Ollama`);
            }
            return `${sessionStats.primary_failed} fehlgeschlagen${parts.length ? ` (${parts.join(' · ')})` : ''}`;
        }

            const failed = sessionStats?.primary_failed ?? 0;
            if (!failed) return '';
            const sourceFailed = sessionStats?.primary_failed_source ?? 0;
            const ollamaFailed = sessionStats?.primary_failed_ollama ?? 0;

            if (sourceFailed && !ollamaFailed) {
                return failed === 1

                    : `${failed} Artikeltexte konnten nicht zuverlässig geladen werden.`;

            if (ollamaFailed && !sourceFailed) {
                return failed === 1
                    ? 'Das lokale Modell hat nicht rechtzeitig geantwortet.'

            if (!compare?.enabled) {

            const progress = compare.progress;
            const sessionStats = compare.session_stats || {};

            if (progress?.total_models) {
                const currentModel = progress.current_model ? ` Gerade läuft ${progress.current_model}.` : '';
                const failures = progress.failed_models ? ` ${progress.failed_models} Modellläufe sind bereits fehlgeschlagen.` : '';
                return {

                    detail: `Summary fertig. ${progress.completed_models} von ${progress.total_models} Modellen sind abgeschlossen.${failures}${currentModel}`.trim(),

            if ((sessionStats.primary_processing ?? 0) > 0 || (sessionStats.primary_queued ?? 0) > 0) {
                return {
                    headline: 'Summary läuft',
                    detail: 'Die Primär-Summary wird gerade erzeugt. Compare startet danach automatisch.',

            if ((sessionStats.requested_total ?? 0) > 0 && (sessionStats.primary_failed ?? 0) > 0 && (sessionStats.primary_ready ?? 0) === 0) {
                return {
                    headline: 'Summary fehlgeschlagen',

            if ((sessionStats.compare_candidate_total ?? 0) > 0 && (sessionStats.pending_articles ?? 0) > 0) {

        async function handleFeedDeduplicate() {

                await loadFeed(true);

        async function handleFeedSkip() {

            const wasViewingHistory = state.feedHistoryIndex >= 0;
            pushFeedHistoryItem(item, 'skip');
            state.lastFeedActionStatus = `Uebersprungen: ${item.title}`;
            if (!wasViewingHistory) {
                removeOnlyCurrentFeedItem(item);
            } else {
                exitFeedHistoryMode();
            }
            renderFeedScreen();
            queueFeedMutation(async () => {
                const result = await api(`/articles/${item.id}/skip`, { method: 'POST' });
                removeCurrentAndSimilarFeedItems(item, result.deduplicated_count);
                if (result.deduplicated_count) {
                    showToast(`${result.deduplicated_count} ähnliche Meldung${result.deduplicated_count > 1 ? 'en' : ''} ebenfalls aus dem Feed entfernt.`, 'info');

                if (state.screen === 'feed' && state.feedItems.length) {
                    renderFeedScreen();
                } else if (!state.feedItems.length) {
                    await loadFeed(true);
                }
                await loadStatus();
            });
        }

        function renderMetricCard(label, value) {
            return `
                <div class="metric">
                    <div class="metric-label">${escapeHtml(label)}</div>
                    <div class="metric-value">${escapeHtml(value)}</div>
                </div>
            `;
        }

        function formatMetric(value) {
            if (value === null || value === undefined || Number.isNaN(Number(value))) return '—';
            return Number(value).toFixed(3);
        }

        function formatThreshold(value) {
            if (value === null || value === undefined || Number.isNaN(Number(value))) return '—';
            return Number(value).toFixed(3);
        }

        function precisionAtKDescriptor(notesJson, k) {
            const bucket = notesJson?.precision_at_k?.[String(k)];
            if (!bucket || bucket.value === null || bucket.value === undefined) {
                return null;
            }
            return {
                value: Number(bucket.value).toFixed(3),
                evaluatedCount: Number(bucket.evaluated_count || 0),
            };
        }

        function formatDelta(latestValue, previousValue) {
            if (latestValue === null || latestValue === undefined || previousValue === null || previousValue === undefined) {
                return null;
            }
            const delta = Number(latestValue) - Number(previousValue);
            const rounded = Math.round(delta * 1000) / 1000;
            const sign = rounded > 0 ? '+' : '';
            return {
                value: `${sign}${rounded.toFixed(3)}`,
                direction: rounded > 0 ? 'up' : rounded < 0 ? 'down' : 'flat',
            };
        }

        function renderDeltaRow(label, latestValue, previousValue) {
            const delta = formatDelta(latestValue, previousValue);
            const deltaMarkup = delta
                ? `<span class="data-pill ${delta.direction === 'up' ? 'compare-on' : delta.direction === 'down' ? 'compare-off' : ''}">${delta.value}</span>`
                : '<span class="data-pill">—</span>';
            return `
                <div class="data-points" style="margin-top: 8px;">
                    <span class="data-pill">${escapeHtml(label)} ${escapeHtml(formatMetric(previousValue))} -> ${escapeHtml(formatMetric(latestValue))}</span>
                    ${deltaMarkup}
                </div>
            `;
        }

        function trainingOutcomeAssessment(latestRun, previousRun) {
            if (!latestRun || !previousRun) return null;

            const f1Delta = Number(latestRun.f1 ?? 0) - Number(previousRun.f1 ?? 0);
            const precisionDelta = Number(latestRun.precision ?? 0) - Number(previousRun.precision ?? 0);
            const recallDelta = Number(latestRun.recall ?? 0) - Number(previousRun.recall ?? 0);

            if (f1Delta >= 0.02) {
                return {
                    tone: 'compare-on',
                    headline: 'Eher besser',
                    detail: 'Der neue Lauf verbessert vor allem die Gesamtbalance aus Precision und Recall.',
                };
            }

            if (f1Delta <= -0.02) {
                return {
                    tone: 'compare-off',
                    headline: 'Eher schlechter',
                    detail: 'Der neue Lauf verschlechtert die Gesamtbalance aus Precision und Recall.',
                };
            }

            if (Math.abs(precisionDelta) >= 0.02 || Math.abs(recallDelta) >= 0.02) {
                return {
                    tone: '',
                    headline: 'Gemischt',
                    detail: 'Eine Metrik bewegt sich sichtbar, aber insgesamt ist der Lauf noch kein klarer Fortschritt.',
                };
            }

            return {
                tone: '',
                headline: 'Eher seitwaerts',
                detail: 'Die Kennzahlen liegen sehr nah am vorherigen Lauf. Praktisch ist das noch kein klarer Sprung.',
            };
        }

        function trainingOutcomeExplainMarkup() {
            return `
                <details style="margin-top: 12px;">
                    <summary style="cursor: pointer; color: var(--accent); font-size: 0.92rem;">Was bedeutet das?</summary>
                    <div style="margin-top: 10px; color: var(--ink-soft); line-height: 1.55;">
                        <div><strong>Precision</strong>: Wenn das Modell "interessant" sagt, wie oft stimmt das dann?</div>
                        <div><strong>Recall</strong>: Von allen wirklich interessanten Faellen, wie viele findet das Modell?</div>
                        <div><strong>F1</strong>: Ein gemeinsamer Wert fuer die Balance aus Precision und Recall. Fuer diese App ist das meist die wichtigste Kurzmetrik.</div>
                        <div><strong>Threshold</strong>: Ab welcher Modell-Wahrscheinlichkeit ein Artikel als empfohlen gilt. Hoeher bedeutet meist weniger falsch Positive, aber auch mehr verpasste gute Treffer.</div>
                        <div><strong>Vielleicht</strong>: Das ist die mittlere Zone zwischen klar empfohlen und eher nein. Sie zeigt brauchbare Kandidaten, die aber noch nicht stark genug fuer die strenge Empfehlung sind.</div>
                        <div><strong>Precision@10 / @20 / @50</strong>: Wie viele der obersten Empfehlungen wirklich gut waren. Fuer den Alltag ist das oft aussagekraeftiger als nur eine globale Accuracy.</div>
                    </div>
                </details>
            `;
        }

        function trainingTargetLabel(target) {
            if (target === 'feed_recommendation') return 'Stufe 1';
            if (target === 'summary_interest') return 'Stufe 2';
            return 'Beide Stufen';
        }

        function trainingElapsedText() {
            if (!state.trainingState?.startedAt) return 'gerade gestartet';
            const elapsedMs = Date.now() - state.trainingState.startedAt;
            const elapsedSeconds = Math.max(1, Math.round(elapsedMs / 1000));
            if (elapsedSeconds < 60) return `seit ${elapsedSeconds}s`;
            return `seit ${Math.round(elapsedSeconds / 60)} min`;
        }

        function summarizeTrainingResults(results) {
            const items = Array.isArray(results) ? results : [];
            const rejected = items.filter(item => item.status === 'rejected').length;
            const trained = items.filter(item => item.status === 'trained').length;
            const insufficient = items.filter(item => item.status === 'insufficient_labels').length;

            let tone = 'compare-on';
            let headline = 'Training abgeschlossen';
            if (items.length && trained === 0 && rejected > 0) {
                tone = 'compare-off';
                headline = 'Training fertig, Kandidat verworfen';
            } else if (insufficient > 0 && trained === 0 && rejected === 0) {
                tone = '';
                headline = 'Training nicht möglich';
            }

            const detail = items.map(item => {
                const label = trainingTargetLabel(item.target);
                if (item.status === 'trained') {
                    return `${label}: aktiv${item.training_duration_ms ? ` · ${formatDuration(item.training_duration_ms)}` : ''}`;
                }
                if (item.status === 'rejected') {
                    return `${label}: Kandidat verworfen${item.training_duration_ms ? ` · ${formatDuration(item.training_duration_ms)}` : ''}`;
                }
                if (item.status === 'insufficient_labels') {
                    return `${label}: zu wenig Labels`;
                }
                return `${label}: ${item.status}`;
            }).join(' · ');

            return { tone, headline, detail };
        }

        function effectiveTrainingStatus() {
            const backendTraining = state.modelOps?.training;
            if (backendTraining?.active) {
                return {
                    active: true,
                    target: backendTraining.target,
                    startedAt: backendTraining.started_at ? new Date(backendTraining.started_at).getTime() : Date.now(),
                };
            }
            return state.trainingBusy ? {
                active: true,
                target: state.trainingState?.target,
                startedAt: state.trainingState?.startedAt || Date.now(),
            } : null;
        }

        function renderPredictionOutcomeBlock(outcomes) {
            if (!outcomes || !outcomes.considered_events) return '';
            return `
                <div class="ops-assessment" style="margin-top: 14px;">
                    <strong>Wo das Modell sich vertut</strong>
                    <p>Gezählt werden die letzten ${escapeHtml(String(outcomes.considered_events))} Feed-Entscheidungen mit gespeichertem Prediction-Snapshot.</p>

                    </div>
                    <details style="margin-top: 12px;">
                        <summary style="cursor: pointer; color: var(--accent); font-size: 0.92rem;">Was bedeutet das?</summary>
                        <div style="margin-top: 10px; color: var(--ink-soft); line-height: 1.55;">
                            <div><strong>Empfohlen -> Weiter</strong>: Das sind starke falsch Positive. Das Modell war zu sicher, du wolltest den Artikel aber nicht.</div>
                            <div><strong>Vielleicht -> Weiter</strong>: Hier war das Modell unsicher und du hast den Artikel verworfen. Das ist weniger schlimm.</div>
                            <div><strong>Eher nein -> Summary</strong>: Das sind harte falsch Negative. Das Modell wollte den Artikel nicht zeigen, du hast ihn aber doch gewählt.</div>
                            <div><strong>Vielleicht -> Summary</strong>: Interessanter Grenzbereich. Diese Fälle zeigen, ob die mittlere Stufe nützlich ist.</div>
                        </div>
                    </details>
                </div>
            `;
        }

        function renderModelCard(title, targetKey, descriptor) {
            const latestRun = descriptor.latest_run;
            const previousRun = descriptor.previous_run;
            const activeRun = descriptor.active_run;
            const counts = descriptor.label_counts || { total: 0, positive: 0, negative: 0 };
            const retraining = descriptor.retraining || { recommended: false, reason: 'unknown', headline: 'Noch warten', detail: '' };
            const quality = descriptor.quality || { headline: 'Keine Einschätzung', detail: '' };
            const outcome = trainingOutcomeAssessment(latestRun, previousRun);
            const matrix = latestRun?.confusion_matrix || [[0, 0], [0, 0]];
            const notesJson = latestRun?.notes_json || {};
            const precisionAt10 = precisionAtKDescriptor(notesJson, 10);
            const precisionAt20 = precisionAtKDescriptor(notesJson, 20);
            const precisionAt50 = precisionAtKDescriptor(notesJson, 50);
            const thresholdStrategy = notesJson?.threshold_strategy;
            const maybeThresholdValue = latestRun?.maybe_threshold_value ?? notesJson?.maybe_threshold_value ?? thresholdStrategy?.maybe_threshold;
            const promotionDecision = notesJson?.promotion_decision;
            const latestRejected = latestRun?.status === 'rejected';
            const trainingStatus = effectiveTrainingStatus();
            const trainingThisTarget = trainingStatus?.active && (
                trainingStatus?.target === targetKey || trainingStatus?.target === 'all'
            );
            const buttonLabel = trainingThisTarget
                ? 'Training läuft ...'
                : (latestRun ? 'Retrain' : 'Train');

            return `
                <div class="ops-card">
                    <h3>${escapeHtml(title)}</h3>
                    <div class="data-points">
                        <span class="data-pill">Labels ${counts.total}</span>
                        <span class="data-pill">Positiv ${counts.positive}</span>
                        <span class="data-pill">Negativ ${counts.negative}</span>
                        <span class="data-pill">Neu seit Training ${descriptor.new_labels_since_training ?? counts.total}</span>
                        <span class="data-pill">${escapeHtml(retraining.headline || (retraining.recommended ? 'Retraining sinnvoll' : 'Noch warten'))}</span>
                    </div>
                    <div class="ops-assessment">
                        <strong>${escapeHtml(quality.headline || 'Keine Einschätzung')}</strong>
                        <p>${escapeHtml(quality.detail || '')}</p>
                    </div>
                    ${latestRejected && activeRun ? `
                        <div class="ops-assessment">
                            <strong>Kandidat verworfen</strong>
                            <p>Der letzte Trainingslauf war als neuer Kandidat schlechter als das aktive Modell. Aktiv bleibt der Lauf von ${escapeHtml(formatRelativeTime(activeRun.trained_at))}.</p>
                        </div>
                    ` : ''}
                    ${latestRun ? `
                        <div class="metric-grid">
                            ${renderMetricCard('Accuracy', latestRun.accuracy?.toFixed?.(3) || latestRun.accuracy)}
                            ${renderMetricCard('Precision', latestRun.precision?.toFixed?.(3) || latestRun.precision)}
                            ${renderMetricCard('Recall', latestRun.recall?.toFixed?.(3) || latestRun.recall)}
                            ${renderMetricCard('F1', latestRun.f1?.toFixed?.(3) || latestRun.f1)}
                        </div>
                        ${targetKey === 'feed_recommendation' ? `
                            <div class="data-points" style="margin-top: 14px;">
                                <span class="data-pill">Threshold ${escapeHtml(formatThreshold(latestRun.threshold_value))}</span>
                                ${maybeThresholdValue ? `<span class="data-pill">Vielleicht ab ${escapeHtml(formatThreshold(maybeThresholdValue))}</span>` : ''}
                                ${precisionAt10 ? `<span class="data-pill">P@10 ${escapeHtml(precisionAt10.value)}${precisionAt10.evaluatedCount < 10 ? ` (${precisionAt10.evaluatedCount})` : ''}</span>` : ''}
                                ${precisionAt20 ? `<span class="data-pill">P@20 ${escapeHtml(precisionAt20.value)}${precisionAt20.evaluatedCount < 20 ? ` (${precisionAt20.evaluatedCount})` : ''}</span>` : ''}
                                ${precisionAt50 ? `<span class="data-pill">P@50 ${escapeHtml(precisionAt50.value)}${precisionAt50.evaluatedCount < 50 ? ` (${precisionAt50.evaluatedCount})` : ''}</span>` : ''}
                            </div>
                            <div class="ops-assessment" style="margin-top: 14px;">
                                <strong>${escapeHtml(thresholdStrategy?.strategy === 'auto_tuned' ? 'Threshold automatisch optimiert' : 'Threshold aktuell fix')}</strong>
                                <p>
                                    ${escapeHtml(thresholdStrategy?.strategy === 'auto_tuned'
                                        ? `Beim letzten Retrain wurde die Schwelle auf hohe Trefferqualitaet optimiert. Klare Empfehlungen sind strenger, darunter gibt es zusaetzlich die Stufe „vielleicht“ (${thresholdStrategy?.objective || 'precision_first_two_stage'}).`
                                        : 'Aktuell gilt die Standardschwelle 0.5.' )}
                                </p>
                            </div>
                            ${renderPredictionOutcomeBlock(descriptor.prediction_outcomes)}
                        ` : ''}
                        <table class="matrix">
                            <thead>
                                <tr>
                                    <th></th>
                                    <th>Pred 0</th>
                                    <th>Pred 1</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th>True 0</th>
                                    <td>${matrix[0]?.[0] ?? 0}</td>
                                    <td>${matrix[0]?.[1] ?? 0}</td>
                                </tr>
                                <tr>
                                    <th>True 1</th>
                                    <td>${matrix[1]?.[0] ?? 0}</td>
                                    <td>${matrix[1]?.[1] ?? 0}</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="data-points">
                            <span class="data-pill ${latestRejected ? 'compare-off' : 'compare-on'}">${latestRejected ? 'Status Kandidat verworfen' : 'Status aktiv'}</span>
                            <span class="data-pill">Trainiert ${escapeHtml(formatRelativeTime(latestRun.trained_at))}</span>
                            <span class="data-pill">Train ${latestRun.train_size}</span>
                            <span class="data-pill">Test ${latestRun.test_size}</span>
                            <span class="data-pill">Dauer ${escapeHtml(formatDuration(notesJson?.training_duration_ms))}</span>
                            ${targetKey === 'feed_recommendation' && notesJson?.collapsed_cluster_count
                                ? `<span class="data-pill">Story-Cluster ${escapeHtml(String(notesJson.collapsed_cluster_count))} statt ${escapeHtml(String(notesJson.raw_label_count || notesJson.collapsed_cluster_count))} Rohlabels</span>`
                                : ''}
                        </div>
                        ${latestRejected && promotionDecision ? `
                            <div class="data-points" style="margin-top: 10px;">
                                <span class="data-pill">Aktives F1 ${escapeHtml(formatMetric(promotionDecision.active_f1))}</span>
                                <span class="data-pill">Kandidat F1 ${escapeHtml(formatMetric(promotionDecision.candidate_f1))}</span>
                            </div>
                        ` : ''}
                        ${previousRun ? `
                            <div class="ops-assessment">
                                <strong>Vergleich zum vorherigen Lauf</strong>
                                <p>So haben sich die Metriken seit dem letzten Training verändert.</p>
                                ${outcome ? `
                                    <div class="data-points" style="margin-top: 10px;">
                                        <span class="data-pill ${escapeHtml(outcome.tone)}">${escapeHtml(outcome.headline)}</span>
                                    </div>
                                    <p style="margin-top: 10px;">${escapeHtml(outcome.detail)}</p>
                                ` : ''}
                                ${renderDeltaRow('Accuracy', latestRun.accuracy, previousRun.accuracy)}
                                ${renderDeltaRow('Precision', latestRun.precision, previousRun.precision)}
                                ${renderDeltaRow('Recall', latestRun.recall, previousRun.recall)}
                                ${renderDeltaRow('F1', latestRun.f1, previousRun.f1)}
                                ${trainingOutcomeExplainMarkup()}
                            </div>
                        ` : ''}
                        <div class="ops-assessment">
                            <strong>${escapeHtml(retraining.headline || 'Noch warten')}</strong>
                            <p>${escapeHtml(retraining.detail || '')}</p>
                        </div>
                    ` : `
                        <p style="color: var(--ink-soft); margin-bottom: 18px;">Noch kein Lauf gespeichert.</p>
                        <div class="ops-assessment">
                            <strong>${escapeHtml(retraining.headline || 'Noch warten')}</strong>
                            <p>${escapeHtml(retraining.detail || '')}</p>
                        </div>
                    `}
                    <div class="ops-actions">
                        <button class="inline-button" data-train-target="${escapeHtml(targetKey)}" ${state.trainingBusy ? 'disabled' : ''}>${buttonLabel}</button>
                    </div>
                </div>
            `;
        }

        function renderCompareDiagnostics(compare) {
            const diagnostics = compare?.diagnostics;
            if (!diagnostics) {
                return `
                    <div class="ops-card">
                        <h3>Compare Diagnostics</h3>
                        <p style="color: var(--ink-soft);">Noch keine Compare-Session vorhanden.</p>
                    </div>
                `;
            }

            const rows = (diagnostics.models || []).map(model => {
                const status = model.last_status || 'noch kein Lauf';
                const toneClass = model.last_status === 'ok'
                    ? 'compare-on'
                    : model.last_status === 'failed'
                        ? 'compare-off'
                        : '';
                return `
                    <tr>
                        <th style="text-align:left;">${escapeHtml(model.model_name)}</th>
                        <td><span class="data-pill ${toneClass}">${escapeHtml(status)}</span></td>
                        <td>${escapeHtml(formatDuration(model.last_duration_ms))}</td>
                        <td>${escapeHtml(model.last_completed_at ? formatRelativeTime(model.last_completed_at) : '—')}</td>
                        <td>${escapeHtml(`${model.ok_count}/${model.failed_count}`)}</td>
                        <td style="text-align:left;">${escapeHtml(model.last_article_title || '—')}</td>
                        <td style="text-align:left;">${escapeHtml(model.last_error || '—')}</td>
                    </tr>
                `;
            }).join('');

            return `
                <div class="ops-card" style="grid-column: 1 / -1;">
                    <h3>Compare Diagnostics</h3>
                    <div class="data-points">
                        <span class="data-pill">Session ${diagnostics.session_id}</span>
                        <span class="data-pill ${diagnostics.session_status === 'active' ? 'compare-on' : 'compare-off'}">${escapeHtml(diagnostics.session_status)}</span>
                        <span class="data-pill">Start ${escapeHtml(formatRelativeTime(diagnostics.enabled_at))}</span>
                        <span class="data-pill">Export ${escapeHtml(basename(diagnostics.export_path))}</span>
                    </div>
                    <table class="matrix">
                        <thead>
                            <tr>
                                <th style="text-align:left;">Modell</th>
                                <th>Status</th>
                                <th>Letzte Dauer</th>
                                <th>Letzter Lauf</th>
                                <th>OK/Fail</th>
                                <th style="text-align:left;">Letzter Artikel</th>
                                <th style="text-align:left;">Letzter Fehler</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows || '<tr><td colspan="7">Noch keine Compare-Daten.</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderOpsScreen() {
            const host = document.getElementById('screen-ops');
            const feedRun = state.modelOps?.targets?.feed_recommendation;
            const summaryRun = state.modelOps?.targets?.summary_interest;
            const status = state.status;
            const compare = status?.llm_compare || { enabled: false, models: [], session: null };
            const compareStats = compare.session_stats || {};
            const compareProgress = compare.progress;
            const compareStatus = compareStatusDescriptor(compare);
            const trainingStatus = effectiveTrainingStatus();
            const trainingBanner = trainingStatus?.active
                ? `
                    <div class="ops-assessment" style="margin: 0 22px 18px;">
                        <strong>Training läuft</strong>
                        <p>${escapeHtml(trainingTargetLabel(trainingStatus?.target))} wird gerade trainiert, ${escapeHtml((() => {
                            const prevState = state.trainingState;
                            state.trainingState = { startedAt: trainingStatus.startedAt };
                            const text = trainingElapsedText();
                            state.trainingState = prevState;
                            return text;
                        })())}. Die Metriken werden aktualisiert, sobald der Lauf fertig ist.</p>
                    </div>
                `
                : state.trainingLastResult
                    ? `
                        <div class="ops-assessment" style="margin: 0 22px 18px;">
                            <strong>${escapeHtml(state.trainingLastResult.headline)}</strong>
                            <p>${escapeHtml(state.trainingLastResult.detail)} · ${escapeHtml(formatRelativeTime(state.trainingLastResult.finishedAt))}</p>
                            <div class="data-points" style="margin-top: 10px;">
                                <span class="data-pill ${escapeHtml(state.trainingLastResult.tone || '')}">Zuletzt beendet</span>
                            </div>
                        </div>
                    `
                : '';

            host.innerHTML = `
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <h2>Model Ops</h2>
                            <p>Konfusionsmatrix, Precision, Recall, F1 und Retraining-Trigger.</p>
                        </div>
                        <div class="toolbar">
                            <button class="inline-button" id="refreshOpsButton">Neu laden</button>
                            <button class="inline-button" id="trainAllButton" ${trainingStatus?.active ? 'disabled' : ''}>${trainingStatus?.active && trainingStatus?.target === 'all' ? 'Training läuft ...' : 'Beide trainieren'}</button>
                        </div>
                    </div>
                    <div style="padding: 22px 22px 0;">
                        ${trainingBanner}
                        <div class="ops-grid" style="margin-bottom: 18px;">
                            <div class="ops-card">
                                <h3>System</h3>
                                <div class="data-points">
                                    <span class="data-pill">Ollama ${status?.ollama?.reachable ? 'online' : 'offline'}</span>
                                    <span class="data-pill">Modell ${escapeHtml(status?.config?.ollama_model || '—')}</span>
                                    <span class="data-pill">Embeddings ${escapeHtml(status?.config?.ollama_embedding_model || '—')}</span>
                                    <span class="data-pill">Ollama-URL ${escapeHtml(status?.config?.ollama_base_url || '—')}</span>
                                    <span class="data-pill">Feeds ${status?.config?.feed_count ?? 0}</span>
                                    <span class="data-pill">Feed-Refresh ${formatRefreshInterval(status?.config?.feed_refresh_seconds)}</span>
                                    <span class="data-pill">Embedding-Worker ${formatRefreshInterval(status?.config?.embedding_poll_seconds)}</span>
                                    <span class="data-pill">Feed offen ${status?.feed?.pending ?? 0}</span>
                                    <span class="data-pill">Queue ${((status?.summaries?.queued ?? 0) + (status?.summaries?.processing ?? 0))}</span>
                                    <span class="data-pill">Ready ${status?.summaries?.ready ?? 0}</span>
                                    <span class="data-pill">Summary-Timeout ${status?.config?.ollama_summary_timeout_seconds ?? '—'}s</span>
                                    <span class="data-pill">Embedding-Timeout ${status?.config?.ollama_embedding_timeout_seconds ?? '—'}s</span>
                                    <span class="data-pill">Compare-Timeout ${status?.config?.llm_compare_timeout_seconds ?? '—'}s</span>
                                    <span class="data-pill ${compare.enabled ? 'compare-on' : 'compare-off'}">LLM Compare ${compare.enabled ? 'an' : 'aus'}</span>
                                </div>
                                <div class="ops-assessment">
                                    <strong style="color: ${compare.enabled ? 'var(--accent-strong)' : '#a04a12'};">${escapeHtml(compareStatus.headline)}</strong>
                                    <p>
                                        ${escapeHtml(compareStatus.detail)}
                                    </p>
                                    ${compareTechDetailsMarkup(compare)}
                                </div>
                                <div class="ops-actions">
                                    <button class="inline-button" id="compareToggleButton">${compare.enabled ? 'LLM Compare ausschalten' : 'LLM Compare einschalten'}</button>
                                </div>
                                <details style="margin-top: 14px;">
                                    <summary style="cursor: pointer; color: var(--accent); font-size: 0.92rem;">Eval-Prompt anzeigen</summary>
                                    <div style="margin-top: 12px;">
                                        <textarea
                                            id="comparePromptText"
                                            readonly
                                            style="width: 100%; min-height: 320px; resize: vertical; border-radius: 16px; border: 1px solid rgba(31, 43, 68, 0.12); background: rgba(255,255,255,0.9); color: var(--ink); padding: 14px 16px; font: 0.83rem/1.45 'SF Mono', 'Menlo', monospace;"
                                        ></textarea>
                                        <div class="ops-actions" style="margin-top: 10px;">
                                            <button class="inline-button" id="copyComparePromptButton">Prompt kopieren</button>
                                        </div>
                                    </div>
                                </details>
                            </div>
                            <div class="ops-card">
                                <h3>Letzter Feed-Refresh</h3>
                                <div class="data-points">
                                    <span class="data-pill">Status ${escapeHtml(status?.last_feed_refresh?.status || 'unbekannt')}</span>
                                    <span class="data-pill">Neu ${status?.last_feed_refresh?.inserted ?? 0}</span>
                                    <span class="data-pill">Aktualisiert ${status?.last_feed_refresh?.updated ?? 0}</span>
                                    <span class="data-pill">Fehler ${(status?.last_feed_refresh?.errors || []).length}</span>
                                </div>
                            </div>
                        </div>
                        <div class="ops-grid">
                            ${feedRun ? renderModelCard('Stufe 1 · Feed Recommendation', 'feed_recommendation', feedRun) : '<div class="ops-card"><h3>Stufe 1 · Feed Recommendation</h3><p>Wird geladen …</p></div>'}
                            ${summaryRun ? renderModelCard('Stufe 2 · Summary Interest', 'summary_interest', summaryRun) : '<div class="ops-card"><h3>Stufe 2 · Summary Interest</h3><p>Wird geladen …</p></div>'}
                            ${renderCompareDiagnostics(compare)}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('refreshOpsButton')?.addEventListener('click', async () => {
                await loadStatus();
                await loadModelOps();
            });
            document.getElementById('trainAllButton')?.addEventListener('click', () => handleTraining('all'));
            document.getElementById('compareToggleButton')?.addEventListener('click', handleCompareToggle);
            const comparePromptText = document.getElementById('comparePromptText');
            if (comparePromptText) {
                comparePromptText.value = buildCompareEvaluationPrompt();
            }
            document.getElementById('copyComparePromptButton')?.addEventListener('click', async () => {
                try {
                    await copyTextToClipboard(buildCompareEvaluationPrompt());
                    showToast('Compare-Prompt in die Zwischenablage kopiert.', 'info');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            document.querySelectorAll('[data-train-target]').forEach(button => {
                button.addEventListener('click', () => handleTraining(button.dataset.trainTarget));
            });
        }

        async function handleCompareToggle() {
            const enabled = !(state.status?.llm_compare?.enabled);
            if (enabled) {
                const confirmed = window.confirm(
                    'LLM Compare erzeugt zusätzliche lokale Modellläufe. Wegen hoher CPU- und RAM-Belastung kann dein Rechner währenddessen spürbar langsamer werden. Trotzdem einschalten?'
                );
                if (!confirmed) {
                    return;
                }
            }
            try {
                const result = await api('/llm-compare', {
                    method: 'POST',
                    body: JSON.stringify({ enabled }),
                });
                showToast(
                    enabled
                        ? `LLM Compare aktiv. Export: ${basename(result.session?.export_path)}`
                        : 'LLM Compare ausgeschaltet.',
                    'info'
                );
                await loadStatus();
                await loadModelOps();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function handleTraining(target) {
            try {
                state.trainingBusy = true;
                state.trainingState = {
                    target,
                    startedAt: Date.now(),
                };
                state.trainingLastResult = null;
                startTrainingTicker();
                renderOpsScreen();
                showToast(`Training gestartet: ${trainingTargetLabel(target)}.`, 'info');
                await nextFrame();
                const payload = await api('/model-ops/train', {
                    method: 'POST',
                    body: JSON.stringify({ target }),
                });
                const resultText = (payload.results || [])
                    .map(result => {
                        if (result.status === 'rejected') {
                            return `${result.target}: Kandidat verworfen`;
                        }
                        return `${result.target}: ${result.status}`;
                    })
                    .join(' · ');
                state.trainingLastResult = {
                    ...summarizeTrainingResults(payload.results || []),
                    finishedAt: new Date().toISOString(),
                };
                showToast(resultText || 'Training abgeschlossen', 'info');
                await loadStatus();
                await loadModelOps();
                if (state.screen === 'feed') {
                    await loadFeed(true);
                }
            } catch (error) {
                state.trainingLastResult = {
                    tone: 'compare-off',
                    headline: 'Training fehlgeschlagen',
                    detail: error.message || 'Unbekannter Fehler',
                    finishedAt: new Date().toISOString(),
                };
                showToast(error.message, 'error');
            } finally {
                state.trainingBusy = false;
                state.trainingState = null;
                stopTrainingTicker();
                if (state.screen === 'ops') {
                    renderOpsScreen();
                }
            }
        }

        function isEditableKeyboardTarget(target) {
            if (!target) return false;
            const tagName = String(target.tagName || '').toLowerCase();
            return tagName === 'input'
                || tagName === 'textarea'
                || tagName === 'select'
                || Boolean(target.isContentEditable);
        }

        function isPlainShortcut(event, key, code = null) {
            if (event.metaKey || event.ctrlKey || event.altKey) return false;
            const normalizedKey = String(event.key || '').toLowerCase();
            return normalizedKey === key || (code && event.code === code);
        }

        function consumeKeyboardEvent(event) {
            event.preventDefault();
            event.stopPropagation();
        }

        function handleKeyboard(event) {
            if (event.repeat || isEditableKeyboardTarget(event.target)) {
                return;
            }
            if (state.screen === 'feed') {
                if (event.key === 'ArrowLeft') {
                    consumeKeyboardEvent(event);
                    handleFeedBack();
                } else if (event.key === 'ArrowRight') {
                    consumeKeyboardEvent(event);
                    handleFeedSkip();
                } else if (isPlainShortcut(event, 's', 'KeyS')) {
                    consumeKeyboardEvent(event);
                    handleFeedSummarize();
                } else if (isPlainShortcut(event, 'r', 'KeyR')) {
                    consumeKeyboardEvent(event);
                    loadFeed(true);
                }
            } else if (state.screen === 'summaries') {
                if (event.key === 'ArrowLeft' && state.summaryIndex > 0) {
                    consumeKeyboardEvent(event);
                    state.summaryIndex -= 1;
                    renderSummaryScreen();
                } else if (isPlainShortcut(event, 'i', 'KeyI')) {
                    consumeKeyboardEvent(event);
                    handleSummaryFeedback('interesting');
                } else if (isPlainShortcut(event, 'n', 'KeyN')) {
                    consumeKeyboardEvent(event);
                    handleSummaryFeedback('not_interesting');
                }
            }
        }

        function bindNav() {
            document.querySelectorAll('.nav-button').forEach(button => {
                if (!button.dataset.screen) return;
                button.addEventListener('click', () => switchScreen(button.dataset.screen));
            });
            document.getElementById('pageReloadButton')?.addEventListener('click', () => window.location.reload());
            document.addEventListener('keydown', handleKeyboard, true);
        }

        async function bootstrap() {
            bindNav();
            state.feedLoading = true;
            renderFeedScreen();
            await loadStatus();
            await loadFeed(true);
            window.setInterval(loadStatus, 7000);
        }

        bootstrap().catch(error => {
            showToast(`Startfehler: ${error.message}`, 'error');
        });
    </script>
</body>
</html>
